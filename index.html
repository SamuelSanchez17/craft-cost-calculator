<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora de precios para piezas artesanales">
  <meta name="theme-color" content="#f5f0eb">
  <title>Calculadora de Precios Artesanales</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/calculator.css">
  <link rel="stylesheet" href="css/components/catalog.css">
  <link rel="stylesheet" href="css/components/combo-builder.css">
  <link rel="stylesheet" href="css/components/candles.css">
  <link rel="stylesheet" href="css/components/quote.css">
  <link rel="stylesheet" href="css/components/settings.css">
  <link rel="stylesheet" href="css/components/history.css">
  <link rel="stylesheet" href="css/components/footer.css">
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <div class="header-logo">Y</div>
      <div>
        <div class="header-title">Yeso Artesanal</div>
        <div class="header-subtitle">Cotizador</div>
      </div>
    </div>
    <div class="header-actions">
      <label class="theme-toggle" title="Modo oscuro">
        <input type="checkbox" id="theme-switch">
        <span class="theme-toggle__track">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 4V2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
        </span>
      </label>
      <button class="header-btn" id="btn-settings" title="Configuración" aria-label="Configuración">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.67 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.67 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.67a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <section id="calculator" class="panel" data-active>
      <!-- Calculator form — llenado por calculator-ui.js -->
    </section>

    <section id="catalog" class="panel">
      <!-- Catalog table -->
    </section>

    <section id="combos" class="panel">
      <!-- Combo builder -->
    </section>

    <section id="candles" class="panel">
      <!-- Candle calculator -->
    </section>

    <section id="quote" class="panel">
      <!-- Quote preview -->
    </section>

    <section id="history" class="panel">
      <!-- Calculation history -->
    </section>

    <section id="settings" class="panel">
      <!-- Config settings -->
    </section>
  </main>

  <footer class="app-footer">
    <nav class="nav-tabs">
      <button class="nav-tab nav-tab--active" data-panel="calculator">
        <svg class="nav-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>
        <span class="nav-tab__label">Calcular</span>
      </button>
      <button class="nav-tab" data-panel="catalog">
        <svg class="nav-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="M3.27 6.96 12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></svg>
        <span class="nav-tab__label">Catálogo</span>
      </button>
      <button class="nav-tab" data-panel="combos">
        <svg class="nav-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7.5a4.5 4.5 0 1 1 4.5-4.5 4.5 4.5 0 0 1-4.5 4.5"/><path d="M12 7.5V22"/><path d="M8 22h8"/><path d="M7.5 11.5a4.5 4.5 0 1 1-4.5-4.5 4.5 4.5 0 0 1 4.5 4.5"/><path d="M16.5 11.5a4.5 4.5 0 1 1 4.5-4.5 4.5 4.5 0 0 1-4.5 4.5"/></svg>
        <span class="nav-tab__label">Combos</span>
      </button>
      <button class="nav-tab" data-panel="candles">
        <svg class="nav-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 0-3 2-3 4a3 3 0 0 0 6 0c0-2-3-4-3-4Z"/><path d="M9 10h6v12H9z"/><path d="M8 22h8"/></svg>
        <span class="nav-tab__label">Velas</span>
      </button>
      <button class="nav-tab" data-panel="history">
        <svg class="nav-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
        <span class="nav-tab__label">Historial</span>
      </button>
    </nav>
  </footer>

  <!-- Scripts (ES modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
